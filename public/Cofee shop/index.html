<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Mockups</title>
    <link rel="icon" href="/logo192.jpeg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: #1e293b;
            /* Dark Slate Background */
            color: #e2e8f0;
            /* Light Slate Text */
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            font-weight: 800;
            color: #a855f7;
            /* Purple Heading */
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .pdf-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin: 20px auto 60px auto;
        }

        .pdf-list a {
            display: block;
            text-decoration: none;
            padding: 24px;
            border-radius: 40px;
            /* More curved - pill style */
            border: 1px solid #334155;
            background: #D2B48C;
            /* Light Brown (Tan) background */
            color: #000000;
            /* Black text */
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .pdf-list a:hover {
            background: #c2a37d;
            /* Darker brown on hover */
            color: #000;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-color: #10b981;
            /* Emerald Green hover border */
        }

        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #a855f7;
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            z-index: 10;
        }

        .back-arrow:hover {
            color: #10b981;
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            .pdf-list {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
                margin-top: 70px;
            }

            .back-arrow {
                top: 15px;
                left: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <a href="/projects/ui-design" class="back-arrow">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>
    <h1>Coffee Shop Mockups</h1>
    <div class="pdf-list">
        <a href="/Cofee shop/Home Page.pdf" target="_blank">Home Page</a>
        <a href="/Cofee shop/Menu Page.pdf" target="_blank">Menu Page</a>
        <a href="/Cofee shop/Order Now Page.pdf" target="_blank">Order Now Page</a>
        <a href="/Cofee shop/Login Page.pdf" target="_blank">Login Page</a>
        <a href="/Cofee shop/Sign Up Page.pdf" target="_blank">Sign Up Page</a>
        <a href="/Cofee shop/Contact Us Page.pdf" target="_blank">Contact Us Page</a>
    </div>
</body>

</html>
